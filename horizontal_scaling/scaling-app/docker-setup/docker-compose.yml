version: '3.8'

services:
  db-master:
    image: mysql:8.0
    command: --server-id=1 --log-bin=mysql-bin --binlog-format=ROW
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: social_app
    ports:
      - "3306:3306"

  db-replica-1:
    image: mysql:8.0
    command: --server-id=2
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    depends_on:
      - db-master

  db-replica-2:
    image: mysql:8.0
    command: --server-id=3
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3308:3306"
    depends_on:
      - db-master